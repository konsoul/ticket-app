<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Field Service Tickets</title>
  
  <!-- Styling -->
  <link rel="stylesheet" href="css/styles.css">
  
  <!-- PWA Manifest & Meta -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f19">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FieldTickets">
  
  <!-- Web App Icons -->
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" href="assets/icon-192.png">
</head>
<body>
  
  <div class="app-container">
    
    <!-- Header with logo and backup tools -->
    <header>
      <div class="header-top">
        <div class="logo">
          <span>Field Service</span>
          <h1>JobTracker</h1>
        </div>
        <div class="action-buttons">
          <button id="exportBtn" class="btn btn-secondary btn-circle" title="Backup Database" aria-label="Backup Database">
            <!-- Download Icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          </button>
          <button id="importBtn" class="btn btn-secondary btn-circle" title="Restore Database" aria-label="Restore Database">
            <!-- Upload Icon -->
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            <input type="file" id="importFile" accept=".json" style="display: none;">
          </button>
        </div>
      </div>
      
      <!-- Search Input -->
      <div class="search-container">
        <span class="search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
        </span>
        <input type="text" id="searchInput" class="search-input" placeholder="Search client name or work info...">
      </div>
      
      <!-- Filter Tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All <span class="badge" id="badge-all">0</span></button>
        <button class="filter-tab" data-filter="open">Open <span class="badge" id="badge-open">0</span></button>
        <button class="filter-tab" data-filter="pending">Pending <span class="badge" id="badge-pending">0</span></button>
        <button class="filter-tab" data-filter="closed">Closed <span class="badge" id="badge-closed">0</span></button>
      </div>
    </header>

    <!-- Ticket List Container -->
    <main id="ticketList" class="ticket-list-wrapper">
      <!-- Dynamic list loaded from IndexedDB -->
      <div class="empty-state">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <h3>No Tickets Found</h3>
        <p>Tap the "+" button below to create your first job ticket.</p>
      </div>
    </main>

    <!-- Floating Action Button for New Ticket -->
    <button id="newTicketFab" class="fab" aria-label="Create Ticket">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    </button>
    
  </div>

  <!-- MODAL: NEW TICKET -->
  <div id="newTicketModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>New Service Ticket</h2>
        <button class="close-btn modal-close-trigger" aria-label="Close modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <form id="newTicketForm">
        <div class="modal-body">
          <div class="form-group">
            <label for="newClientName">Client / Company Name</label>
            <input type="text" id="newClientName" class="form-control" placeholder="e.g. Acme Corp" required>
          </div>
          <div class="form-group">
            <label for="newClientContact">Contact Details</label>
            <input type="text" id="newClientContact" class="form-control" placeholder="e.g. John Doe, 555-0199, Suite 404">
          </div>
          <div class="form-group">
            <label for="newWorkDescription">Work to be Done</label>
            <textarea id="newWorkDescription" class="form-control" placeholder="Describe the computer, network, or server issue..." required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary modal-close-trigger">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Ticket</button>
        </div>
      </form>
    </div>
  </div>

  <!-- MODAL: TICKET DETAILS & LOGGING -->
  <div id="detailModal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ticket Detail</h2>
        <button class="close-btn modal-close-trigger" aria-label="Close modal">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        
        <!-- Client Details -->
        <div class="ticket-details-info">
          <div id="detailClientName" class="details-client-title">Client Name</div>
          <div id="detailClientContact" class="details-client-contact">
            <!-- Contact Icon -->
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            <span id="detailClientContactText">Contact details here</span>
          </div>
        </div>

        <!-- Ticket Status Toggle -->
        <div class="form-group">
          <label>Status</label>
          <div class="status-toggle-group">
            <button class="status-toggle-btn btn-status-open" data-status="open">Open</button>
            <button class="status-toggle-btn btn-status-pending" data-status="pending">Pending</button>
            <button class="status-toggle-btn btn-status-closed" data-status="closed">Closed</button>
          </div>
        </div>

        <!-- Work Description (Editable) -->
        <div class="form-group">
          <label for="detailWorkDesc">Work Description</label>
          <textarea id="detailWorkDesc" class="form-control"></textarea>
        </div>

        <!-- Time Tracker -->
        <div class="details-time-tracker">
          <div class="form-group" style="margin-bottom: 0;">
            <label>Time Invested</label>
            <div class="tracker-time">
              <!-- Pulse dot is dynamically added next to time -->
              <span id="timerDisplay">00:00:00</span>
              <small id="totalMinutesDisplay">(0 mins total)</small>
            </div>
            
            <div class="tracker-controls" style="margin-top: 10px;">
              <button id="toggleTimerBtn" class="btn btn-primary" style="flex: 1;">Start Timer</button>
              <button id="addManualTimeBtn" class="btn btn-secondary" style="flex: 1;">Log Manual Time</button>
            </div>
            
            <div class="quick-time-buttons">
              <button class="quick-time-btn" data-time="15">+15 min</button>
              <button class="quick-time-btn" data-time="30">+30 min</button>
              <button class="quick-time-btn" data-time="60">+1 hr</button>
              <button class="quick-time-btn" data-time="-15">-15 min</button>
              <button class="quick-time-btn" data-time="clear">Reset Time</button>
            </div>
          </div>
        </div>

        <!-- Chronological Progress Notes -->
        <div class="notes-section">
          <label>Progress Notes / Updates</label>
          
          <form id="addNoteForm" style="display: flex; gap: 8px; margin-top: 10px; margin-bottom: 16px;">
            <input type="text" id="newNoteText" class="form-control" placeholder="Add a progress update or resolution..." required>
            <button type="submit" class="btn btn-primary" style="padding: 10px 14px;">Add</button>
          </form>

          <div id="notesTimeline" class="timeline">
            <!-- Timeline items loaded dynamically -->
          </div>
        </div>

        <!-- Delete Button -->
        <div style="margin-top: 36px; border-top: 1px solid rgba(239, 68, 68, 0.2); padding-top: 20px;">
          <button id="deleteTicketBtn" class="btn btn-danger" style="width: 100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
            Delete Ticket
          </button>
        </div>

      </div>
      <div class="modal-footer">
        <button id="saveDetailBtn" class="btn btn-primary" style="width: 100%;">Save Changes & Close</button>
      </div>
    </div>
  </div>

  <!-- DB scripts -->
  <script src="js/db.js"></script>
  <!-- Application logic -->
  <script src="js/app.js"></script>
  
  <!-- Service Worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then((reg) => console.log('Service Worker registered successfully.', reg))
          .catch((err) => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
